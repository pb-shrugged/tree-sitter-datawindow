name: Lint

on:
  push:
    branches: [master]
    paths:
      - grammars/**/grammar.js
      - eslint.config.mjs
      - package.json
  pull_request:
    paths:
      - grammars/**/grammar.js
      - eslint.config.mjs
      - package.json

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          cache: npm
          node-version: ${{vars.NODE_VERSION}}
      - name: Install modules
        run: npm ci --legacy-peer-deps
      - name: Run ESLint
        run: npm run lint